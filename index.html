<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Agenda OSPIV</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f4f8;--white:#fff;--blue:#1a5fa8;--blue2:#154d8a;
  --green:#1e8a4c;--green-bg:#e8f7ee;
  --red:#c0392b;--red-bg:#fdecea;
  --orange:#e67e22;--orange-bg:#fff3e0;
  --gray:#6b7a8d;--gray2:#dde3ea;--gray3:#f5f7fa;
  --text:#1a2332;--radius:14px;
  --font:'Nunito',sans-serif;
  --shadow:0 2px 10px rgba(0,0,0,.09);
  --shadow-lg:0 6px 24px rgba(0,0,0,.13);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto}

/* HEADER */
.hdr{background:var(--blue);padding:12px 16px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow);position:sticky;top:0;z-index:50}
.hdr img{height:44px;background:#fff;border-radius:8px;padding:3px 6px;object-fit:contain}
.hdr-text h1{font-size:16px;font-weight:800;color:#fff;line-height:1.1}
.hdr-text p{font-size:11px;color:rgba(255,255,255,.7);margin-top:1px}
.sync-pill{margin-left:auto;display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.15);border-radius:20px;padding:4px 10px;font-size:11px;color:rgba(255,255,255,.9);font-weight:700;white-space:nowrap;cursor:pointer}
.sdot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.4)}
.sdot.ok{background:#4ade80}.sdot.spin{background:#fbbf24;animation:blink 1s infinite}.sdot.err{background:#f87171}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* NAV */
.nav{display:flex;background:var(--white);border-bottom:1px solid var(--gray2)}
.nav-btn{flex:1;padding:11px 6px 9px;background:none;border:none;border-bottom:3px solid transparent;font-family:var(--font);font-size:11px;font-weight:700;color:var(--gray);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .15s,border-color .15s}
.nav-btn.on{color:var(--blue);border-bottom-color:var(--blue)}
.nav-icon{font-size:20px;line-height:1}

/* VISTAS */
.view{display:none;padding:14px 14px 90px}
.view.on{display:block}

/* BACK */
.back{background:none;border:none;color:var(--blue);font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;padding:0 0 14px;display:flex;align-items:center;gap:6px}

/* CARD */
.card{background:var(--white);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.card-title{font-size:12px;font-weight:800;color:var(--blue);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px}

/* FIELD */
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--gray);margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;background:var(--gray3);border:2px solid var(--gray2);border-radius:10px;color:var(--text);font-family:var(--font);font-size:15px;padding:10px 12px;outline:none;transition:border-color .2s;-webkit-appearance:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue);background:var(--white)}
.field textarea{resize:none;height:68px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* CHIPS DÍAS */
.days-wrap{display:flex;flex-wrap:wrap;gap:6px}
.dchip{padding:6px 12px;border-radius:20px;font-size:13px;font-weight:700;border:2px solid var(--gray2);background:var(--gray3);color:var(--gray);cursor:pointer;transition:all .15s}
.dchip.on{background:var(--blue);border-color:var(--blue);color:#fff}

/* BTNS */
.btn{width:100%;padding:13px;border-radius:12px;border:none;font-family:var(--font);font-size:15px;font-weight:800;cursor:pointer;transition:opacity .15s}
.btn:active{opacity:.8}
.btn-blue{background:var(--blue);color:#fff}
.btn-gray{background:var(--gray2);color:var(--gray)}
.btn-red{background:var(--red-bg);color:var(--red)}
.btn-row{display:flex;gap:8px}
.btn-sm{padding:7px 14px;font-size:12px;border-radius:8px;border:none;font-family:var(--font);font-weight:700;cursor:pointer}
.btn-sm-blue{background:#e8f0fe;color:var(--blue)}
.btn-sm-red{background:var(--red-bg);color:var(--red)}

/* DOCTOR BUTTON (pantalla home) */
.doc-btn{width:100%;background:var(--white);border:2px solid var(--blue);border-radius:var(--radius);padding:18px;display:flex;align-items:center;gap:14px;cursor:pointer;box-shadow:var(--shadow);margin-bottom:10px;text-align:left;transition:transform .1s}
.doc-btn:active{transform:scale(.98)}
.doc-avatar{width:52px;height:52px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;flex-shrink:0}
.doc-info h2{font-size:17px;font-weight:800;color:var(--blue)}
.doc-info p{font-size:12px;color:var(--gray);margin-top:2px}
.doc-arrow{margin-left:auto;font-size:22px;color:var(--blue);opacity:.5}

/* LISTA DE FECHAS */
.month-lbl{font-size:11px;font-weight:800;color:var(--gray);text-transform:uppercase;letter-spacing:.8px;margin:14px 0 6px 2px}
.date-btn{width:100%;background:var(--white);border:none;border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;box-shadow:var(--shadow);margin-bottom:8px;text-align:left;transition:transform .1s}
.date-btn:active{transform:scale(.98)}
.date-box{width:50px;height:50px;border-radius:10px;background:var(--blue);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.date-box.full{background:var(--gray)}
.db-day{font-size:10px;font-weight:700;opacity:.85}
.db-num{font-size:22px;font-weight:900;line-height:1}
.db-mon{font-size:9px;font-weight:700;opacity:.85}
.date-info h3{font-size:15px;font-weight:800}
.date-info p{font-size:12px;color:var(--gray);margin-top:2px}
.badge{border-radius:20px;padding:4px 11px;font-size:11px;font-weight:800;margin-left:auto;flex-shrink:0}
.badge.free{background:var(--green-bg);color:var(--green)}
.badge.full{background:var(--gray2);color:var(--gray)}
.badge.part{background:var(--orange-bg);color:var(--orange)}
.load-more{width:100%;background:none;border:2px dashed var(--gray2);border-radius:12px;padding:14px;color:var(--gray);font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px}
.history-btn{width:100%;background:none;border:2px dashed #ddd;border-radius:12px;padding:12px;color:#bbb;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px}

/* HEADER DÍA */
.day-hdr{background:var(--blue);color:#fff;border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)}
.day-hdr-box{width:50px;height:50px;border-radius:10px;background:rgba(255,255,255,.2);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.dhb-day{font-size:10px;font-weight:700;opacity:.9}
.dhb-num{font-size:24px;font-weight:900;line-height:1}
.dhb-mon{font-size:9px;font-weight:700;opacity:.9}
.day-hdr-info h2{font-size:16px;font-weight:800}
.day-hdr-info p{font-size:11px;opacity:.8;margin-top:2px}
.day-hdr-cnt{margin-left:auto;text-align:center;flex-shrink:0}
.cnt-n{font-size:26px;font-weight:900;line-height:1}
.cnt-l{font-size:9px;opacity:.8}

/* SLOTS */
.slot{background:var(--white);border-radius:12px;margin-bottom:8px;box-shadow:var(--shadow);overflow:hidden;border-left:4px solid var(--gray2)}
.slot.taken{border-left-color:var(--blue)}
.slot-inner{padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer}
.slot.taken .slot-inner{cursor:default}
.slot-time{font-size:16px;font-weight:900;color:var(--blue);width:52px;flex-shrink:0}
.slot-pat h3{font-size:14px;font-weight:800}
.slot-pat p{font-size:11px;color:var(--gray);margin-top:2px}
.slot-free{font-size:13px;color:var(--gray);font-weight:600}
.slot-plus{margin-left:auto;width:32px;height:32px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;flex-shrink:0}
.slot-actions{display:flex;border-top:1px solid var(--gray2)}
.slot-act{flex:1;padding:10px;background:none;border:none;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px}
.slot-act.edit{color:var(--blue);border-right:1px solid var(--gray2)}
.slot-act.del{color:var(--red)}
.no-slots{text-align:center;padding:30px;color:var(--gray);font-size:13px}

/* DOCTOR PILL (admin) */
.doc-pill{background:var(--white);border-radius:12px;padding:14px;box-shadow:var(--shadow);margin-bottom:8px;display:flex;align-items:flex-start;gap:10px}
.doc-pill-info{flex:1}
.doc-pill-info h4{font-size:14px;font-weight:800}
.doc-pill-info p{font-size:11px;color:var(--gray);margin-top:3px;line-height:1.5}
.doc-pill-actions{display:flex;gap:6px;flex-shrink:0}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:flex-end;justify-content:center}
.overlay.on{display:flex}
.modal{background:var(--white);border-radius:20px 20px 0 0;width:100%;max-width:480px;transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);padding-bottom:32px}
.overlay.on .modal{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:var(--gray2);border-radius:2px;margin:12px auto}
.modal-head{padding:10px 18px 14px;border-bottom:1px solid var(--gray2)}
.modal-head h2{font-size:17px;font-weight:800}
.modal-head p{font-size:12px;color:var(--gray);margin-top:3px;font-weight:600}
.modal-body{padding:14px 18px 0}
.modal-foot{padding:14px 18px 0;display:flex;gap:8px}

/* TOAST */
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(16px);background:#1a2332;color:#fff;padding:11px 20px;border-radius:24px;font-size:13px;font-weight:700;z-index:300;opacity:0;transition:all .22s;white-space:nowrap;box-shadow:var(--shadow-lg)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{background:var(--green)}.toast.err{background:var(--red)}

/* EMPTY */
.empty{text-align:center;padding:36px 20px;color:var(--gray)}
.empty-icon{font-size:44px;margin-bottom:10px}
.empty p{font-size:13px;line-height:1.6}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--white);border-top:1px solid var(--gray2);display:flex;box-shadow:0 -3px 12px rgba(0,0,0,.07);z-index:100;padding-bottom:env(safe-area-inset-bottom,0)}
.bnav-btn{flex:1;padding:10px 6px 9px;background:none;border:none;border-bottom:3px solid transparent;font-family:var(--font);font-size:10px;font-weight:700;color:var(--gray);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .15s,border-color .15s}
.bnav-btn.on{color:var(--blue);border-bottom-color:var(--blue)}
.bicon{font-size:22px;line-height:1}

hr{border:none;border-top:1px solid var(--gray2);margin:14px 0}
</style>
</head>

<script>
// ══════════════════════════════════════════════════════════
//  CONSTANTES
// ══════════════════════════════════════════════════════════
const URL_GAS   = 'https://script.google.com/macros/s/AKfycbw8GwPidsmm9UlYTco4xtaE3BCIPvseUX0g1pnS5ua9ODFbKioqfBbWWvC-eRVwc1SClA/exec';
const DIAS      = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const MESES     = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const MESES_S   = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

// ══════════════════════════════════════════════════════════
//  STATE — servidor es la fuente de verdad
// ══════════════════════════════════════════════════════════
let S = { doctors:[], appointments:{} };  // state en memoria
let activeDoc    = null;   // {...doctor}
let activeDate   = null;   // 'YYYY-MM-DD'
let editingSlot  = null;   // {date, docId, time}
let shownMonths  = 1;
let showHistory  = false;
let syncTimer    = null;

// ══════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════
function init() {
  setupChips('aDays');
  setupChips('eDays');
  // Cerrar modales al tocar fondo
  document.querySelectorAll('.overlay').forEach(o => {
    o.addEventListener('click', e => { if(e.target===o) closeModal(o.id); });
  });
  pull(); // siempre arrancar desde el servidor
}

// ══════════════════════════════════════════════════════════
//  SYNC — GET puro, sin CORS issues
// ══════════════════════════════════════════════════════════
function setStat(cls, lbl) {
  document.getElementById('sdot').className = 'sdot' + (cls?' '+cls:'');
  document.getElementById('slbl').textContent = lbl;
}

// PULL: traer datos del servidor
async function pull() {
  setStat('spin', 'actualizando...');
  try {
    const r = await fetch(URL_GAS + '?action=pull&t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const j = await r.json();
    if (j.ok && j.data) {
      S = j.data;
      localStorage.setItem('ospiv_cache', JSON.stringify(S));
    } else {
      // Sin datos en servidor — intentar cache local
      const cache = localStorage.getItem('ospiv_cache');
      if (cache) S = JSON.parse(cache);
    }
    setStat('ok', 'OK');
    setTimeout(() => setStat('','Google'), 3000);
  } catch(e) {
    // Sin conexión — usar cache
    const cache = localStorage.getItem('ospiv_cache');
    if (cache) S = JSON.parse(cache);
    setStat('err', 'sin conexión');
  }
  render();
}

// PUSH: mandar datos al servidor — split en chunks si es necesario
async function push() {
  clearTimeout(syncTimer);
  setStat('spin', 'guardando...');
  // Guardar en cache local siempre
  localStorage.setItem('ospiv_cache', JSON.stringify(S));
  try {
    const payload = JSON.stringify({ doctors: S.doctors, appointments: S.appointments });
    const url     = URL_GAS + '?action=push&d=' + encodeURIComponent(payload);
    // Si la URL es muy larga, hacer push solo del mes actual y siguientes
    const r = await fetch(url);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const j = await r.json();
    if (!j.ok) throw new Error(j.error || 'error servidor');
    setStat('ok', 'guardado ✓');
    setTimeout(() => setStat('','Google'), 4000);
  } catch(e) {
    setStat('err', 'reintentando...');
    syncTimer = setTimeout(push, 20000);
  }
}

function forcePull() { pull(); toast('Actualizando...'); }

// ══════════════════════════════════════════════════════════
//  RENDER GLOBAL
// ══════════════════════════════════════════════════════════
function render() {
  renderHome();
  renderAdminDocs();
  if (activeDoc && document.getElementById('vDates').classList.contains('on')) renderDates();
  if (activeDoc && activeDate && document.getElementById('vSlots').classList.contains('on')) renderSlots();
}

// ══════════════════════════════════════════════════════════
//  NAVEGACIÓN
// ══════════════════════════════════════════════════════════
function showView(id, navIdx) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('on'));
  document.querySelectorAll('.bnav-btn').forEach(b => b.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  document.getElementById('bn'+navIdx).classList.add('on');
  window.scrollTo(0,0);
}
function goHome()  { shownMonths=1; showHistory=false; renderHome(); showView('vHome',0); }
function goDates() { renderDates(); showView('vDates',0); }

// ══════════════════════════════════════════════════════════
//  VISTA HOME
// ══════════════════════════════════════════════════════════
function renderHome() {
  const c = document.getElementById('docBtns');
  if (!S.doctors.length) {
    c.innerHTML = `<div class="empty"><div class="empty-icon">👨‍⚕️</div><p>No hay médicos cargados.<br>Ir a <b>Administrar</b> para agregar uno.</p></div>`;
    return;
  }
  c.innerHTML = S.doctors.map(doc => {
    const ini = doc.name.replace(/Dr[a]?\.\s*/i,'').split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
    const dias = (doc.days||[]).map(d=>DIAS[d]).join(', ');
    return `<button class="doc-btn" onclick="selectDoc('${doc.id}')">
      <div class="doc-avatar">${ini}</div>
      <div class="doc-info"><h2>${h(doc.name)}</h2><p>${h(doc.specialty)} · ${dias} · ${doc.startTime}–${doc.endTime}</p></div>
      <div class="doc-arrow">›</div>
    </button>`;
  }).join('');
}

function selectDoc(id) {
  activeDoc   = S.doctors.find(d=>d.id===id);
  shownMonths = 1; showHistory = false;
  renderDates();
  showView('vDates',0);
}

// ══════════════════════════════════════════════════════════
//  VISTA FECHAS
// ══════════════════════════════════════════════════════════
function getFutureDates() {
  if (!activeDoc) return [];
  const today = new Date(); today.setHours(0,0,0,0);
  const limit = new Date(today.getFullYear(), today.getMonth()+shownMonths+1, 0);
  const res = []; const cur = new Date(today);
  while (cur <= limit) {
    if ((activeDoc.days||[]).includes(cur.getDay())) res.push(new Date(cur));
    cur.setDate(cur.getDate()+1);
  }
  return res;
}
function getPastDates() {
  if (!activeDoc) return [];
  const today = new Date(); today.setHours(0,0,0,0);
  return Object.keys(S.appointments)
    .filter(d => { const dt=new Date(d+'T00:00:00'); return dt<today && Object.keys(S.appointments[d]).some(k=>k.startsWith(activeDoc.id+'_')); })
    .sort().map(d=>new Date(d+'T00:00:00'));
}

function dateBtnHTML(d) {
  const ds     = fmt(d);
  const slots  = genSlots(activeDoc);
  const taken  = Object.keys(S.appointments[ds]||{}).filter(k=>k.startsWith(activeDoc.id+'_')).length;
  const total  = slots.length;
  const dn     = DIAS[d.getDay()], ms = MESES_S[d.getMonth()];
  let bc='free', bl='Disponible';
  if(taken>0&&taken<total){bc='part';bl=taken+'/'+total;}
  if(taken>=total&&total>0){bc='full';bl='Completo';}
  return `<button class="date-btn" onclick="selectDate('${ds}')">
    <div class="date-box${bc==='full'?' full':''}"><span class="db-day">${dn}</span><span class="db-num">${d.getDate()}</span><span class="db-mon">${ms}</span></div>
    <div class="date-info"><h3>${dn} ${d.getDate()} de ${MESES[d.getMonth()]}</h3><p>${taken} turno${taken!==1?'s':''} de ${total}</p></div>
    <span class="badge ${bc}">${bl}</span>
  </button>`;
}

function renderDates() {
  const fut = getFutureDates();
  const c   = document.getElementById('datesList');
  // Agrupar por mes
  const byM = {};
  fut.forEach(d=>{ const k=d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0'); if(!byM[k])byM[k]=[]; byM[k].push(d); });
  let html = `<div style="font-size:17px;font-weight:800;margin-bottom:14px">${h(activeDoc.name)}</div>`;
  if (!fut.length) html += `<div class="empty"><div class="empty-icon">📅</div><p>No hay fechas disponibles.<br>Cargá el mes siguiente.</p></div>`;
  Object.keys(byM).sort().forEach(ym=>{
    const [y,m]=ym.split('-');
    html += `<div class="month-lbl">${MESES[parseInt(m)-1]} ${y}</div>`;
    byM[ym].forEach(d=>{ html+=dateBtnHTML(d); });
  });
  c.innerHTML = html;
  // Historial
  const past = getPastDates();
  const hBtn = document.getElementById('historyBtn');
  hBtn.style.display = past.length ? 'flex' : 'none';
  hBtn.textContent   = showHistory ? '🗂 Ocultar historial' : '🗂 Ver turnos anteriores';
  renderHistory(past);
}

function renderHistory(past) {
  const c = document.getElementById('historyList');
  if (!showHistory || !past.length) { c.innerHTML=''; return; }
  const byM={};
  past.forEach(d=>{ const k=d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0'); if(!byM[k])byM[k]=[]; byM[k].push(d); });
  let html='';
  Object.keys(byM).sort().reverse().forEach(ym=>{
    const [y,m]=ym.split('-');
    html+=`<div class="month-lbl" style="color:#aaa">${MESES[parseInt(m)-1]} ${y} <span style="font-size:10px">(pasado)</span></div>`;
    byM[ym].forEach(d=>{ html+=dateBtnHTML(d); });
  });
  c.innerHTML=html;
}

function loadMore()      { shownMonths++; renderDates(); }
function toggleHistory() { showHistory=!showHistory; renderDates(); }

// ══════════════════════════════════════════════════════════
//  VISTA SLOTS
// ══════════════════════════════════════════════════════════
function selectDate(ds) {
  activeDate = ds;
  renderSlots();
  showView('vSlots',0);
}

function genSlots(doc) {
  const slots=[];
  const [sh,sm]=doc.startTime.split(':').map(Number);
  const [eh,em]=doc.endTime.split(':').map(Number);
  let cur=sh*60+sm; const end=eh*60+em;
  const dur=parseInt(doc.duration)||20;
  while(cur+dur<=end){
    slots.push(String(Math.floor(cur/60)).padStart(2,'0')+':'+String(cur%60).padStart(2,'0'));
    cur+=dur;
  }
  return slots;
}

function renderSlots() {
  const doc   = activeDoc;
  const ds    = activeDate;
  const d     = new Date(ds+'T00:00:00');
  const slots = genSlots(doc);
  const appts = S.appointments[ds]||{};
  const taken = slots.filter(t=>appts[doc.id+'_'+t]).length;
  // Header
  document.getElementById('dayHdr').innerHTML=`
    <div class="day-hdr">
      <div class="day-hdr-box"><span class="dhb-day">${DIAS[d.getDay()]}</span><span class="dhb-num">${d.getDate()}</span><span class="dhb-mon">${MESES_S[d.getMonth()]}</span></div>
      <div class="day-hdr-info"><h2>${h(doc.name)}</h2><p>${h(doc.specialty)} · ${doc.startTime}–${doc.endTime}</p></div>
      <div class="day-hdr-cnt"><div class="cnt-n">${taken}/${slots.length}</div><div class="cnt-l">turnos</div></div>
    </div>`;
  // Slots
  let html='';
  slots.forEach(time=>{
    const key  = doc.id+'_'+time;
    const appt = appts[key];
    if (appt) {
      const detail = [appt.dni?'DNI: '+h(appt.dni):'', appt.phone?'Tel: '+h(appt.phone):''].filter(Boolean).join(' · ');
      html+=`<div class="slot taken">
        <div class="slot-inner">
          <div class="slot-time">${time}</div>
          <div class="slot-pat"><h3>${h(appt.patient)}</h3>${detail?`<p>${detail}</p>`:''}${appt.obs?`<p>${h(appt.obs)}</p>`:''}</div>
        </div>
        <div class="slot-actions">
          <button class="slot-act edit" onclick="openEdit('${ds}','${doc.id}','${time}')">✏️ Editar</button>
          <button class="slot-act del"  onclick="delTurno('${ds}','${doc.id}','${time}')">🗑 Borrar</button>
        </div>
      </div>`;
    } else {
      html+=`<div class="slot" onclick="openNew('${ds}','${doc.id}','${time}')">
        <div class="slot-inner">
          <div class="slot-time">${time}</div>
          <div class="slot-free">Turno disponible</div>
          <div class="slot-plus">+</div>
        </div>
      </div>`;
    }
  });
  document.getElementById('slotsList').innerHTML = html || '<div class="no-slots">Sin turnos generados.<br>Revisá el horario del médico.</div>';
}

// ══════════════════════════════════════════════════════════
//  TURNOS CRUD
// ══════════════════════════════════════════════════════════
function openNew(ds, docId, time) {
  editingSlot = {ds, docId, time};
  const d=new Date(ds+'T00:00:00'), doc=S.doctors.find(x=>x.id===docId);
  document.getElementById('mTitle').textContent = 'Asignar turno';
  document.getElementById('mSub').textContent   = DIAS[d.getDay()]+' '+d.getDate()+' de '+MESES[d.getMonth()]+' · '+time+' · '+(doc?doc.name:'');
  document.getElementById('mPat').value=''; document.getElementById('mDni').value='';
  document.getElementById('mPhone').value=''; document.getElementById('mObs').value='';
  openModal('mTurno');
  setTimeout(()=>document.getElementById('mPat').focus(),300);
}

function openEdit(ds, docId, time) {
  const appt=(S.appointments[ds]||{})[docId+'_'+time];
  if(!appt)return;
  editingSlot={ds,docId,time};
  const d=new Date(ds+'T00:00:00'), doc=S.doctors.find(x=>x.id===docId);
  document.getElementById('mTitle').textContent = 'Editar turno';
  document.getElementById('mSub').textContent   = DIAS[d.getDay()]+' '+d.getDate()+' · '+time+' · '+(doc?doc.name:'');
  document.getElementById('mPat').value  =appt.patient||'';
  document.getElementById('mDni').value  =appt.dni||'';
  document.getElementById('mPhone').value=appt.phone||'';
  document.getElementById('mObs').value  =appt.obs||'';
  openModal('mTurno');
}

function saveTurno() {
  const pat=document.getElementById('mPat').value.trim();
  if(!pat){toast('Ingresá el nombre del paciente','err');return;}
  const {ds,docId,time}=editingSlot;
  if(!S.appointments[ds])S.appointments[ds]={};
  S.appointments[ds][docId+'_'+time]={
    patient:pat,
    dni:    document.getElementById('mDni').value.trim(),
    phone:  document.getElementById('mPhone').value.trim(),
    obs:    document.getElementById('mObs').value.trim()
  };
  closeModal('mTurno');
  renderSlots();
  renderDates();
  toast('Turno guardado ✓','ok');
  push();
}

function delTurno(ds,docId,time) {
  if(!confirm('¿Borrar este turno?'))return;
  const key=docId+'_'+time;
  if(S.appointments[ds]){
    delete S.appointments[ds][key];
    if(!Object.keys(S.appointments[ds]).length) delete S.appointments[ds];
  }
  renderSlots();
  renderDates();
  toast('Turno eliminado');
  push();
}

// ══════════════════════════════════════════════════════════
//  MÉDICOS CRUD
// ══════════════════════════════════════════════════════════
function setupChips(id) {
  document.querySelectorAll('#'+id+' .dchip').forEach(c=>c.addEventListener('click',()=>c.classList.toggle('on')));
}
function getChips(id) {
  return Array.from(document.querySelectorAll('#'+id+' .dchip.on')).map(c=>parseInt(c.dataset.d));
}

function addDoctor() {
  const name=document.getElementById('aName').value.trim();
  const days=getChips('aDays');
  if(!name){toast('Ingresá el nombre','err');return;}
  if(!days.length){toast('Seleccioná al menos un día','err');return;}
  S.doctors.push({
    id:'doc_'+Date.now(), name,
    specialty:document.getElementById('aSpec').value.trim(),
    days, startTime:document.getElementById('aStart').value,
    endTime:document.getElementById('aEnd').value,
    duration:parseInt(document.getElementById('aDur').value)||20
  });
  document.getElementById('aName').value=''; document.getElementById('aSpec').value='';
  document.querySelectorAll('#aDays .dchip').forEach(c=>c.classList.remove('on'));
  renderAdminDocs(); renderHome();
  toast('Médico guardado ✓','ok');
  push();
}

function renderAdminDocs() {
  const c=document.getElementById('docList');
  if(!S.doctors.length){c.innerHTML='<p style="color:var(--gray);font-size:13px">Sin médicos cargados.</p>';return;}
  c.innerHTML=S.doctors.map(doc=>{
    const dias=(doc.days||[]).map(d=>DIAS[d]).join(', ');
    return `<div class="doc-pill">
      <div class="doc-pill-info">
        <h4>${h(doc.name)}</h4>
        <p>${h(doc.specialty)} · ${dias}<br>${doc.startTime}–${doc.endTime} · cada ${doc.duration} min</p>
      </div>
      <div class="doc-pill-actions">
        <button class="btn-sm btn-sm-blue" onclick="openEditDoc('${doc.id}')">Editar</button>
        <button class="btn-sm btn-sm-red"  onclick="delDoc('${doc.id}')">Borrar</button>
      </div>
    </div>`;
  }).join('');
}

function openEditDoc(id) {
  const doc=S.doctors.find(d=>d.id===id); if(!doc)return;
  document.getElementById('eId').value   =id;
  document.getElementById('eName').value =doc.name;
  document.getElementById('eSpec').value =doc.specialty||'';
  document.getElementById('eStart').value=doc.startTime;
  document.getElementById('eEnd').value  =doc.endTime;
  document.getElementById('eDur').value  =doc.duration;
  document.querySelectorAll('#eDays .dchip').forEach(c=>c.classList.toggle('on',(doc.days||[]).includes(parseInt(c.dataset.d))));
  openModal('mDoc');
}

function saveEditDoc() {
  const id=document.getElementById('eId').value;
  const idx=S.doctors.findIndex(d=>d.id===id); if(idx===-1)return;
  const oldDays=S.doctors[idx].days||[];
  const newDays=getChips('eDays');
  S.doctors[idx]={...S.doctors[idx],
    name:document.getElementById('eName').value.trim(),
    specialty:document.getElementById('eSpec').value.trim(),
    days:newDays,
    startTime:document.getElementById('eStart').value,
    endTime:document.getElementById('eEnd').value,
    duration:parseInt(document.getElementById('eDur').value)||20
  };
  // Detectar turnos futuros en días que ya no corresponden
  const daysChanged=JSON.stringify(oldDays.slice().sort())!==JSON.stringify(newDays.slice().sort());
  if(daysChanged) cleanOrphanSlots(id, newDays);
  closeModal('mDoc');
  renderAdminDocs(); renderHome();
  toast('Médico actualizado ✓','ok');
  push();
}

function cleanOrphanSlots(docId, newDays) {
  const today=new Date(); today.setHours(0,0,0,0);
  let removed=0;
  Object.keys(S.appointments).forEach(ds=>{
    const d=new Date(ds+'T00:00:00');
    if(d<today||newDays.includes(d.getDay()))return;
    Object.keys(S.appointments[ds]).forEach(k=>{
      if(k.startsWith(docId+'_')){ delete S.appointments[ds][k]; removed++; }
    });
    if(!Object.keys(S.appointments[ds]).length) delete S.appointments[ds];
  });
  if(removed>0) toast(removed+' turno'+(removed>1?'s':'')+' futuro'+(removed>1?'s':'')+' eliminado'+(removed>1?'s':''),'ok');
}

function delDoc(id) {
  if(!confirm('¿Eliminar este médico? Se borrarán todos sus turnos futuros.'))return;
  const today=new Date(); today.setHours(0,0,0,0);
  // Borrar solo turnos futuros — los pasados quedan en el state para el Sheet
  Object.keys(S.appointments).forEach(ds=>{
    const d=new Date(ds+'T00:00:00');
    if(d<today)return;
    Object.keys(S.appointments[ds]).forEach(k=>{ if(k.startsWith(id+'_')) delete S.appointments[ds][k]; });
    if(!Object.keys(S.appointments[ds]).length) delete S.appointments[ds];
  });
  S.doctors=S.doctors.filter(d=>d.id!==id);
  renderAdminDocs(); renderHome();
  toast('Médico eliminado');
  push();
}

// ══════════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════════
function openModal(id)  { document.getElementById(id||'mTurno').classList.add('on'); }
function closeModal(id) { document.getElementById(id||'mTurno').classList.remove('on'); }
function fmt(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function h(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg,type='') {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast on'+(type?' '+type:'');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('on'),2600);
}

init();
</script>
</body>
</html>
